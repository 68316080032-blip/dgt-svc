<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG HUB | เข้าสู่ระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Lato', 'Poppins', 'Noto Sans Thai', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl border border-slate-100/80 space-y-6 text-center">
        <div>
            <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-rose-500">SIGN IN</h1>
            <p class="text-xs text-slate-400 font-medium mt-1">เข้าสู่ระบบเพื่อจัดการผลงานครีเอเตอร์ของคุณ</p>
        </div>

        <form id="form-login" class="space-y-4 text-left">
            <div class="space-y-1">
                <label for="login-email" class="text-[11px] font-bold text-slate-500 uppercase tracking-wide">อีเมล (EMAIL)</label>
                <input type="email" id="login-email" placeholder="example@vghub.com" class="w-full bg-slate-50 text-xs px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all" required>
            </div>
            
            <div class="space-y-1 relative">
                <div class="flex justify-between items-center">
                    <label for="login-password" class="text-[11px] font-bold text-slate-500 uppercase tracking-wide">รหัสผ่าน (PASSWORD)</label>
                    <button type="button" id="btn-forgot-password-trigger" class="text-[10px] text-orange-500 font-bold hover:underline focus:outline-none">ลืมรหัสผ่าน?</button>
                </div>
                <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-slate-50 text-xs px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all" required>
            </div>

            <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-orange-500 to-rose-500 hover:from-orange-600 hover:to-rose-600 text-white text-xs font-bold shadow-md shadow-orange-500/10 transition-all active:scale-[0.99] mt-2">
                LOGIN / เข้าสู่ระบบ
            </button>
        </form>

        <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-slate-100"></div>
            <span class="flex-shrink mx-4 text-[10px] text-slate-400 font-bold uppercase tracking-widest">or connect with</span>
            <div class="flex-grow border-t border-slate-100"></div>
        </div>

        <button type="button" id="btn-google-login" class="w-full py-3 rounded-xl bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-xs font-bold shadow-2xs transition-all active:scale-[0.99] flex items-center justify-center space-x-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v4.51h6.6c-.29 1.53-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.66-5.17 3.66-8.17z"/>
                <path fill="#34A853" d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.08 1.16-3.15 0-5.81-2.13-6.76-5.01H1.31v3.15C3.29 21.24 7.39 24 12 24z"/>
                <path fill="#FBBC05" d="M5.24 14.19c-.24-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.46H1.31C.48 8.12 0 9.97 0 12s.48 3.88 1.31 5.54l3.93-3.35z"/>
                <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.22 0 12 0 7.39 0 3.29 2.76 1.31 6.46l3.93 3.35c.95-2.88 3.61-5.01 6.76-5.01z"/>
            </svg>
            <span>Sign in with Google</span>
        </button>

        <p class="text-[11px] text-slate-400 font-medium">ยังไม่เป็นสมาชิกใช่ไหม? <a href="register.html" class="text-orange-500 font-bold hover:underline">สมัครสมาชิกที่นี่</a></p>
    </div>

    <div id="modal-forgot-password" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-slate-100 text-center space-y-4">
            <div>
                <h3 class="text-base font-bold text-slate-800">🔒 กู้คืนรหัสผ่าน</h3>
                <p class="text-[11px] text-slate-400 mt-1">ระบบจะส่งลิงก์เพื่อตั้งรหัสผ่านใหม่ไปให้ที่อีเมลของคุณ</p>
            </div>
            <form id="form-forgot-password" class="space-y-3 text-left">
                <div class="space-y-1">
                    <label for="forgot-email" class="text-[10px] font-bold text-slate-500 uppercase tracking-wide">กรอกอีเมลของคุณ (EMAIL)</label>
                    <input type="email" id="forgot-email" placeholder="example@vghub.com" class="w-full bg-slate-50 text-xs px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-orange-500 transition-all" required>
                </div>
                <div class="flex space-x-2 pt-1">
                    <button type="button" id="btn-forgot-password-close" class="flex-1 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold transition-all">
                        ยกเลิก
                    </button>
                    <button type="submit" class="flex-1 py-2 rounded-xl bg-gradient-to-r from-orange-500 to-rose-500 text-white text-xs font-bold transition-all active:scale-[0.98]">
                        ส่งลิงก์กู้คืน
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./js/login.js"></script>
</body>
</html>
