<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG HUB | เข้าสู่ระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Lato', 'Poppins', 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/80 backdrop-blur-md border border-slate-200/60 p-8 rounded-3xl shadow-xl shadow-slate-200/50 space-y-6">
        
        <div class="text-center space-y-1.5">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-rose-500 uppercase tracking-wider">Sign In</h1>
            <p class="text-xs text-slate-400 font-medium">เข้าสู่ระบบเพื่อจัดการผลงานครีเอเตอร์ของคุณ</p>
        </div>

        <hr class="border-slate-100">

        <form id="form-login" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">อีเมล (Email)</label>
                <input type="email" id="login-email" placeholder="example@vghub.com" class="w-full bg-white text-xs px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-slate-800 shadow-2xs placeholder:text-slate-300" required>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">รหัสผ่าน (Password)</label>
                <input type="password" id="login-password" placeholder="••••••••" class="w-full bg-white text-xs px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-slate-800 shadow-2xs placeholder:text-slate-300" required>
            </div>

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-orange-600 to-rose-600 hover:from-orange-500 hover:to-rose-500 text-white rounded-xl text-xs font-bold shadow-md shadow-orange-600/10 transition-all uppercase tracking-wider">
                Login / เข้าสู่ระบบ
            </button>
        </form>

        <div class="relative flex py-1 items-center">
            <div class="flex-grow border-t border-slate-200/60"></div>
            <span class="flex-shrink mx-4 text-[10px] text-slate-400 font-bold uppercase tracking-widest">or connect with</span>
            <div class="flex-grow border-t border-slate-200/60"></div>
        </div>

        <div>
            <button id="btn-google-login" class="w-full flex items-center justify-center space-x-3 bg-white hover:bg-slate-50/80 border border-slate-200 py-2.5 px-4 rounded-xl text-xs font-bold text-slate-600 shadow-2xs transition-all">
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </button>
        </div>

        <div class="text-center pt-2 border-t border-slate-100">
            <p class="text-xs text-slate-400 font-medium">ยังไม่เป็นสมาชิกใช่ไหม? <a href="register.html" class="text-orange-600 hover:text-orange-700 font-bold ml-1 transition-colors">สมัครสมาชิกที่นี่</a></p>
        </div>
    </div>

</body>
</html>
